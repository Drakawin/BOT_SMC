; BOT_SMC Configuration File
; Copyright 2026, BOT_SMC

[Broker]
; Broker UTC offset (hours)
UTCOffset=2

; Magic number for order identification
MagicNumber=123456

; Maximum slippage in points
MaxSlippage=10

[Logging]
; Log level: TRACE, DEBUG, INFO, WARN, ERROR, FATAL
LogLevel=INFO

; Log file path
LogPath=data/logs/

; Log retention in days
LogRetention=30

[Persistence]
; State file path
StatePath=data/state/

; Auto-save interval in seconds
AutoSaveInterval=60

; Maximum archive size in MB
MaxArchiveSize=100

[Performance]
; Maximum tick processing time in milliseconds
MaxTickProcessingTime=1

; Maximum event processing time in milliseconds
MaxEventProcessingTime=5

; Maximum state update time in milliseconds
MaxStateUpdateTime=10

[Trading]
; Lot size
LotSize=0.01

; Risk:Reward ratio
RiskRewardRatio=2

; Maximum open positions
MaxOpenPositions=1

; Equity kill threshold (percentage)
EquityKillThreshold=50

[SMC]
; Swing Fractal Strength
SwingFractalStrength=2

; Equal Level Tolerance in points
EqualLevelTolerance=20

; FVG Minimum Size in points
FVGMinSize=10

; Stop Loss Buffer in points
SLBuffer=20

; Break-Even Buffer in points
BreakEvenBuffer=5

; Maximum Risk Per Trade in points
MaxRiskPerTradePoints=1500

[Timeframes]
; Primary Trend Timeframe
PrimaryTrendTimeframe=PERIOD_H4

; Market Structure Timeframe
MarketStructureTimeframe=PERIOD_H1

; Execution Timeframe
ExecutionTimeframe=PERIOD_M15

[Sessions]
; London Session Start (UTC)
LondonSessionStart=07:00

; London Session End (UTC)
LondonSessionEnd=10:00

; New York AM Session Start (UTC)
NewYorkAMSessionStart=12:00

; New York AM Session End (UTC)
NewYorkAMSessionEnd=15:00
